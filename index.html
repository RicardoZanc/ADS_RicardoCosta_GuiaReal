<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h2>
    Teste
</h2>
    <script>
        async function escreverIndefinidamente(intervalInSeconds){
            try{
                console.log('teste')
            } catch(e) {
                console.log(e)
            }
            finally{
                setTimeout(()=>{escreverIndefinidamente(intervalInSeconds)}, intervalInSeconds*1000)
            }
        }

        async function escreverDefinidamente(intervalInSeconds, quantity, count=0) {

            if(!count && count !=0){
                count=0
            }

            if(count>=quantity){
                return;
            }

            try{
                console.log('test: ', count)
            } catch(e){
                console.log(e)
            } 
            finally {
                setTimeout(()=>{escreverDefinidamente(intervalInSeconds, quantity, count+1)}, intervalInSeconds*1000)
            }
        }

        async function escrever(intervalInSeconds, quantity=0){
            if(quantity){
                return await escreverDefinidamente(intervalInSeconds, quantity)
            }
            return await escreverIndefinidamente(intervalInSeconds)
        }

        escrever(2, 2)

    </script>
</body>

</html>
